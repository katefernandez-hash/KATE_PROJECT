<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kate Fernandez | Systems & Design</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #16161a;
      --primary: #00ff9d;
      --secondary: #94a3b8;
      --accent: #2dd4bf;
      --border: rgba(255, 255, 255, 0.1);
      --font-mono: 'Fira Code', monospace;
      --font-sans: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      color: white;
      font-family: var(--font-sans);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* --- SCANLINE EFFECT --- */
    body::before {
      content: " ";
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 9999;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 10%;
      background: rgba(10, 10, 12, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .nav-logo { font-family: var(--font-mono); font-weight: 700; color: var(--primary); }
    .nav-links a { text-decoration: none; color: var(--secondary); margin-left: 2rem; font-size: 0.85rem; font-family: var(--font-mono); transition: 0.3s; }
    .nav-links a:hover { color: var(--primary); }
    .cv-download { border: 1px solid var(--primary); color: var(--primary) !important; padding: 0.5rem 1rem; border-radius: 4px; }

    header {
      padding: 120px 10% 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 50px;
      flex-wrap: wrap;
    }

    .hero-content { flex: 1; min-width: 300px; }
    
    .profile-container {
      position: relative;
      width: 320px;
      height: 320px;
      flex-shrink: 0;
    }

    .profile-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 100%; height: 100%;
      background: var(--primary);
      filter: blur(80px);
      opacity: 0.15;
      z-index: -1;
    }

    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
      border: 1px solid var(--primary);
      box-shadow: 0 0 20px rgba(0, 255, 157, 0.1);
    }

    .badge { font-family: var(--font-mono); color: var(--primary); background: rgba(0, 255, 157, 0.1); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 1rem; display: inline-block; }
    h1 { font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; letter-spacing: -2px; margin-bottom: 1rem; }
    h1 span { color: var(--primary); }

    section { padding: 80px 10%; }
    .section-head { font-family: var(--font-mono); font-size: 1.5rem; margin-bottom: 3rem; display: flex; align-items: center; }
    .section-head::after { content: ""; height: 1px; background: var(--border); flex-grow: 1; margin-left: 20px; }

    /* --- PORTFOLIO GRID --- */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
    }

    .project-card:hover { border-color: var(--primary); transform: translateY(-5px); }

    .card-banner {
      width: 100%;
      height: 180px;
      overflow: hidden;
      background: #000;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .card-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.7;
      transition: 0.5s;
    }

    .project-card:hover .card-banner img { opacity: 1; }

    .card-body { padding: 1.5rem; }
    .project-card h3 { margin-bottom: 0.5rem; font-size: 1.25rem; color: var(--primary); }
    
    .proof-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.3s;
    }

    .proof-btn:hover {
      background: var(--primary);
      color: black;
    }
